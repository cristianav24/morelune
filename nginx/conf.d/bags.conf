# ─── Redirigir HTTP → HTTPS ──────────────────────────────────
server {
    listen 80;
    server_name morelune.com www.morelune.com api.morelune.com;

    # Let's Encrypt challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ─── Storefront (morelune.com) ───────────────────────────────
server {
    listen 443 ssl http2;
    server_name morelune.com www.morelune.com;

    ssl_certificate /etc/letsencrypt/live/morelune.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/morelune.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Redirigir www → sin www (mejor para SEO)
    if ($host = www.morelune.com) {
        return 301 https://morelune.com$request_uri;
    }

    # Cache de assets estáticos Next.js
    location /_next/static/ {
        proxy_pass http://storefront:3000;
        proxy_cache_valid 200 365d;
        add_header Cache-Control "public, immutable, max-age=31536000";
    }

    # Imágenes y archivos públicos
    location /images/ {
        proxy_pass http://storefront:3000;
        add_header Cache-Control "public, max-age=86400";
    }

    # Storefront principal
    location / {
        limit_req zone=store burst=20 nodelay;
        proxy_pass http://storefront:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}

# ─── Backend API (api.morelune.com) ─────────────────────────
server {
    listen 443 ssl http2;
    server_name api.morelune.com;

    ssl_certificate /etc/letsencrypt/live/api.morelune.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.morelune.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Uploads (imágenes de productos)
    location /uploads/ {
        proxy_pass http://backend:9000;
        add_header Cache-Control "public, max-age=2592000";
    }

    # API
    location / {
        limit_req zone=api burst=10 nodelay;
        proxy_pass http://backend:9000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300;
        proxy_connect_timeout 300;
    }
}
